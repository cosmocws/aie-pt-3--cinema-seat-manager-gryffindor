<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Asientos de Cine</title>
  </head>
  <body class="min-h-screen bg-[#050608] text-slate-100">
    <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col items-center justify-center gap-6 px-4 py-8">
      <header class="w-full max-w-4xl rounded-2xl border border-slate-700 bg-slate-900/80 p-5 text-center">
        <h1 class="text-2xl font-black tracking-tight text-slate-100 md:text-3xl">Reserva de Asientos</h1>
        <p class="mt-2 text-sm text-slate-300">Haz clic en cada asiento para alternar entre libre y ocupado.</p>
      </header>

      <section class="w-full max-w-4xl rounded-2xl border border-slate-700 bg-[#0b0d12] p-5 shadow-[0_20px_60px_rgba(0,0,0,0.55)]">
        <div class="mx-auto mb-4 h-4 w-[88%] rounded-full bg-gradient-to-b from-slate-200 to-slate-500 opacity-85"></div>
        <p class="mb-5 text-center text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Pantalla</p>

        <div class="overflow-x-auto pb-2">
          <div id="seat-grid" class="mx-auto w-fit"></div>
        </div>

        <div class="mt-5 grid gap-3 md:grid-cols-2">
          <p id="resumen" class="rounded-lg border border-slate-700 bg-slate-900/70 px-3 py-2 text-sm text-slate-200"></p>
          <p id="estado" class="rounded-lg border border-slate-700 bg-slate-900/70 px-3 py-2 text-sm text-slate-200"></p>
        </div>

        <div class="mt-4 flex flex-wrap gap-2">
          <label for="cantidad" class="sr-only">Cantidad</label>
          <input id="cantidad" type="number" min="1" max="10" value="2" class="w-28 rounded-lg border border-slate-600 bg-slate-950 px-3 py-2 text-sm text-slate-100" />
          <button id="reservar-bloque" type="button" class="rounded-lg bg-sky-500 px-3 py-2 text-sm font-bold text-slate-950 hover:bg-sky-400">Reservar bloque</button>
          <button id="reiniciar" type="button" class="rounded-lg border border-slate-500 px-3 py-2 text-sm font-bold text-slate-100 hover:bg-slate-800">Reiniciar</button>
        </div>

        <pre id="estado-json" class="mt-4 overflow-x-auto rounded-lg border border-slate-700 bg-slate-950 p-3 text-xs text-slate-300"></pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
