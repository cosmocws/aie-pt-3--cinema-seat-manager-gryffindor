<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gran Cine de Gryffindor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="magic-atmosphere" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="hero-panel">
        <p class="hero-kicker">Colegio Hogwarts de Magia y Hechiceria</p>
        <h1>Gran Cine de Gryffindor</h1>
        <p class="hero-subtitle">Reserva tu asiento en la sala mas valiente de Hogwarts.</p>
      </header>

      <section class="cinema-panel">
        <div class="screen-wrapper">
          <div class="screen-glow"></div>
          <div class="screen-bar"></div>
          <p class="screen-label">Pantalla Encantada</p>
        </div>

        <div class="seat-grid-frame" aria-label="Mapa de asientos">
          <div id="seat-grid" class="mx-auto w-fit"></div>
        </div>

        <div class="status-grid">
          <p id="resumen" class="status-card"></p>
          <p id="estado" class="status-card"></p>
        </div>

        <div class="controls-row">
          <label for="cantidad" class="sr-only">Cantidad</label>
          <input id="cantidad" type="number" min="1" max="10" value="2" class="magic-input" />
          <button id="reservar-bloque" type="button" class="magic-button">Reservar bloque</button>
          <button id="reiniciar" type="button" class="magic-button secondary">Reiniciar sala</button>
        </div>

        <pre id="estado-json" class="json-panel"></pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
